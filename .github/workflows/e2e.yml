name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onsective
          POSTGRES_PASSWORD: onsective
          POSTGRES_DB: onsective
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U onsective"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://onsective:onsective@localhost:5432/onsective?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_SECRET: ci-session-secret-32-bytes-padding-padding
      E2E_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @onsective/db deploy
      - run: pnpm --filter @onsective/db seed
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm test:e2e
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
