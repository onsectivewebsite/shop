name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · type-check · test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: onsective
          POSTGRES_PASSWORD: onsective
          POSTGRES_DB: onsective
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U onsective"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://onsective:onsective@localhost:5432/onsective?schema=public
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      SESSION_SECRET: ci-session-secret-32-bytes-padding-padding

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply migrations
        run: pnpm --filter @onsective/db deploy
        env:
          DATABASE_URL: postgresql://onsective:onsective@localhost:5432/onsective?schema=public

      - name: Type-check
        run: pnpm type-check

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
